<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idle Collector</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1 id="gameTitle">⚗ The Alchemist's Workshop</h1>
    <p class="subtitle" id="gameSubtitle">Gather reagents. Transmute essence. Uncover the Great Work.</p>
    <div class="skin-switcher">
      <button class="skin-btn" data-skin="dark"    onclick="applySkin('dark')">⚗ Alchemist</button>
      <button class="skin-btn" data-skin="light"   onclick="applySkin('light')">☀ Garden</button>
      <button class="skin-btn" data-skin="kittens" onclick="applySkin('kittens')">🐱 Kittens</button>
      <button class="skin-btn" data-skin="plain"   onclick="applySkin('plain')">📋 Plain</button>
    </div>
  </header>

  <div class="essence-bar">
    <div class="total-section">
      <div class="essence-label" id="essenceLabel">Essence</div>
      <div class="essence-total" id="essenceDisplay">0</div>
    </div>
    <div class="total-section">
      <div class="essence-label">Total Earned</div>
      <div class="total-earned" id="totalEarned">0</div>
    </div>
    <div class="total-section">
      <div class="essence-label">Per Second</div>
      <div class="essence-rate" id="rateDisplay">+0.00/s</div>
    </div>
  </div>

  <div id="prestigePanel" class="prestige-panel"></div>

  <div class="game-layout">
    <div>
      <div class="section-title">Collectors</div>
      <div class="reagents-panel" id="reagentsPanel"></div>
    </div>
    <div>
      <div class="section-title">Upgrades</div>
      <div class="upgrades-panel" id="upgradesPanel"></div>
    </div>

    <div class="save-panel">
      <span class="label">Progress:</span>
      <button class="save-btn" onclick="downloadSave()">⬇ Download</button>
      <button class="save-btn" onclick="uploadSave()">⬆ Upload</button>
      <button class="save-btn" onclick="exportSave()">📋 Copy Code</button>
      <button class="save-btn" onclick="document.getElementById('saveCodeRow').style.display='flex'">📥 Paste Code</button>
      <button class="save-btn danger" onclick="resetGame()">✕ Reset</button>
    </div>

    <div class="save-code-row" id="saveCodeRow" style="display:none">
      <textarea class="save-code" id="saveCode" placeholder="Paste save code here…" spellcheck="false"></textarea>
      <button class="save-btn" onclick="importSave()">Import</button>
      <button class="save-btn" onclick="document.getElementById('saveCodeRow').style.display='none'; document.getElementById('saveCode').value=''">Cancel</button>
    </div>

    <div>
      <div class="section-title">Chronicle</div>
      <div class="log-panel" id="logPanel"></div>
    </div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
